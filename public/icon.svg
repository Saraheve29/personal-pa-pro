<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="#1C1812"/>
  
  <!-- Inner warm cream panel -->
  <rect x="32" y="32" width="448" height="448" rx="70" fill="#FAF6EE"/>
  
  <!-- Gold top bar - executive header -->
  <rect x="32" y="32" width="448" height="120" rx="70" fill="#9A7B3C"/>
  <rect x="32" y="100" width="448" height="52" fill="#9A7B3C"/>
  
  <!-- Subtle gold shimmer line -->
  <rect x="32" y="148" width="448" height="3" fill="#C4993E"/>
  
  <!-- Calendar/schedule icon - represents appointments -->
  <!-- Calendar frame -->
  <rect x="96" y="188" width="148" height="140" rx="10" fill="none" stroke="#9A7B3C" stroke-width="10"/>
  <!-- Calendar top rings -->
  <rect x="128" y="172" width="16" height="32" rx="8" fill="#9A7B3C"/>
  <rect x="196" y="172" width="16" height="32" rx="8" fill="#9A7B3C"/>
  <!-- Calendar grid dots -->
  <circle cx="130" cy="240" r="7" fill="#9A7B3C"/>
  <circle cx="170" cy="240" r="7" fill="#9A7B3C"/>
  <circle cx="210" cy="240" r="7" fill="#C4993E"/>
  <circle cx="130" cy="280" r="7" fill="#9A7B3C"/>
  <circle cx="170" cy="280" r="7" fill="#C4993E"/>
  <circle cx="210" cy="280" r="7" fill="#9A7B3C"/>
  <!-- Tick on one date - appointment confirmed -->
  <path d="M200 228 L212 242 L228 220" fill="none" stroke="#C4993E" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Clipboard/briefing icon - represents the PA briefing -->
  <rect x="272" y="188" width="148" height="140" rx="10" fill="none" stroke="#9A7B3C" stroke-width="10"/>
  <!-- Clipboard top clip -->
  <rect x="316" y="172" width="60" height="28" rx="8" fill="#9A7B3C"/>
  <!-- Lines representing briefing document -->
  <line x1="298" y1="235" x2="400" y2="235" stroke="#C4993E" stroke-width="8" stroke-linecap="round"/>
  <line x1="298" y1="258" x2="380" y2="258" stroke="#9A7B3C" stroke-width="7" stroke-linecap="round"/>
  <line x1="298" y1="279" x2="390" y2="279" stroke="#9A7B3C" stroke-width="7" stroke-linecap="round"/>
  <line x1="298" y1="300" x2="360" y2="300" stroke="#9A7B3C" stroke-width="7" stroke-linecap="round"/>

  <!-- Gold star connector between the two icons -->
  <text x="256" y="278" text-anchor="middle" font-size="28" fill="#C4993E">✦</text>

  <!-- Bottom text area -->
  <text x="256" y="390" text-anchor="middle" font-family="Georgia, serif" font-size="30" fill="#1C1812" letter-spacing="3">PERSONAL PA</text>
  <text x="256" y="425" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#9A7B3C" letter-spacing="8">PRO</text>
  
  <!-- Small gold line under PRO -->
  <line x1="190" y1="438" x2="322" y2="438" stroke="#C4993E" stroke-width="2"/>
</svg>
